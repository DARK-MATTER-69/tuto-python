<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block title %}
            mon blog
        {% endblock title %}
    </title>
    <style>
        body{
            font-family: sans-serif;
            margin: 20px;
            background-color: #f4f4f4f4;
            color: #333;
        }

        nav{
            background-color: #333;
            padding: 10px;
            margin-bottom: 20px;
        }

        nav a {
            margin-right: 25px;
            text-decoration: none;
            color: white;            
        }
        .container{
            background-color: white;
            border-radius: 5px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

    h1,h2 {
        color: #555;
    }
    </style>
</head>
<body>
    {% csrf_token %}
    <nav>
        <a href="{% url 'blogapp:accueil' %}">Accueil</a>
        {% if user.authenticated %}
            <a href="{% url 'blogapp:deconnexion' %}">deconnexion</a> 
            <a href="{% url 'blogapp:creer_article' %}">creer un article</a> 
        {% else %}
            <a href="{% url 'blogapp:connexion' %}">Connexion</a>
            <a href="{% url 'blogapp:inscription' %}">Inscription</a>
        {% endif %}
        
    </nav>
    <div class="container">
        {% block content %}

        {% endblock content %}
    </div>
</body>
</html>
